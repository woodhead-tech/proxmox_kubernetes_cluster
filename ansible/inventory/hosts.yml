# hosts.yml - Proxmox host inventory
#
# Update with your Proxmox node(s) connection details.
# These playbooks target the Proxmox hosts themselves (not the Talos VMs).
# LXC containers are listed under their respective groups for post-provision config.
all:
  children:
    # Proxmox hypervisor nodes
    proxmox:
      hosts:
        pve1:
          ansible_host: 192.168.86.29  # Update with your Proxmox node 1 IP
          ansible_user: root
        pve2:
          ansible_host: 192.168.86.30
          ansible_user: root
        pve3:
          ansible_host: 192.168.86.31  # thinkcentre3 - has RTL8188EUS WiFi dongle for pwnagotchi
          ansible_user: root
        tower1:
          ansible_host: 192.168.86.130
          ansible_user: root
        zotac:
          ansible_host: 192.168.86.147
          ansible_user: root

    # AdGuard Home DNS server LXC
    adguard:
      vars:
        ansible_ssh_private_key_file: ~/.ssh/id_ansible
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes"
      hosts:
        adguard:
          ansible_host: 192.168.86.35
          ansible_user: root

    # Traefik reverse proxy LXC
    traefik:
      vars:
        ansible_ssh_private_key_file: ~/.ssh/id_ansible
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes"
      hosts:
        traefik-gw:
          ansible_host: 192.168.86.20  # Update with Traefik LXC IP
          ansible_user: root

    # Application LXC containers
    lxc_services:
      vars:
        ansible_ssh_private_key_file: ~/.ssh/id_ansible
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes"
      hosts:
        recipe-site:
          ansible_host: 192.168.86.21  # Update with recipe site LXC IP
          ansible_user: root
        arr-stack:
          ansible_host: 192.168.86.22  # ARR media stack LXC IP
          ansible_user: root
        plex-server:
          ansible_host: 192.168.86.23  # Plex Media Server LXC IP
          ansible_user: root
        jellyfin-server:
          ansible_host: 192.168.86.24  # Jellyfin Media Server LXC IP
          ansible_user: root
        monitoring-stack:
          ansible_host: 192.168.86.25  # Monitoring stack LXC IP
          ansible_user: root
        openclaw:
          ansible_host: 192.168.86.26  # OpenClaw AI agent LXC IP
          ansible_user: root
        authentik:
          ansible_host: 192.168.86.28  # Authentik identity provider LXC IP
          ansible_user: root
        wireguard:
          ansible_host: 192.168.86.39  # WireGuard VPN tunnel LXC IP
          ansible_user: root
        step-ca:
          ansible_host: 192.168.86.36  # Step-CA SSH Certificate Authority LXC IP
          ansible_user: root
        libby-alert:
          ansible_host: 192.168.86.27  # Libby life alert website LXC IP
          ansible_user: root
        kanboard:
          ansible_host: 192.168.86.33  # Kanboard project management LXC IP
          ansible_user: root
        mailserver:
          ansible_host: 192.168.86.34  # Mailcow email server LXC IP
          ansible_user: root
        pxe-server:
          ansible_host: 192.168.86.35  # PXE boot server LXC IP
          ansible_user: root
        zigbee2mqtt:
          ansible_host: 192.168.86.36  # Zigbee2MQTT + Mosquitto LXC IP (on zotac)
          ansible_user: root
        claude-os:
          ansible_host: 192.168.86.37  # Claude OS AI memory/knowledge system LXC
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        pwnagotchi:
          ansible_host: 192.168.86.38  # Pwnagotchi WiFi learning device LXC (thinkcentre3)
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        ollama:
          ansible_host: 192.168.86.42  # Ollama LLM Inference LXC IP
          ansible_user: root

    # SDR scanner LXC (Trunk Recorder + rdio-scanner, on thinkcentre2)
    sdr:
      vars:
        ansible_ssh_private_key_file: ~/.ssh/id_ansible
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes"
      hosts:
        sdr-scanner:
          ansible_host: 192.168.86.32
          ansible_user: root

    # Standalone workstations (not Proxmox-managed)
    workstations:
      vars:
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      hosts:
        lenovo-go:
          ansible_host: 192.168.86.154  # wired; wifi: .152
          ansible_user: bwoodwar
          ansible_become: true
        ubuntu-laptop:
          ansible_host: 192.168.86.137
          ansible_user: bwoodwar
          ansible_become: true

    # Raspberry Pi devices (standalone, not Proxmox-managed)
    raspberry_pi:
      vars:
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes"
      hosts:
        piboard:
          ansible_host: 192.168.86.131
          ansible_user: bwoodwar

    # Klipper 3D printer hosts (Raspberry Pi + Klipper/Moonraker/Mainsail)
    klipper:
      vars:
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      hosts:
        klipper-ender5pro:
          ansible_host: 192.168.86.136
          ansible_user: bwoodwar
          klipper_printer: ender5pro
        klipper-ender3:
          ansible_host: 192.168.86.138
          ansible_user: bwoodwar
          klipper_printer: ender3

    # Intersection groups for service-specific playbooks (hosts: lxc_services:&<group>)
    arr:
      hosts:
        arr-stack:
    plex:
      hosts:
        plex-server:
    jellyfin:
      hosts:
        jellyfin-server:
    monitoring:
      hosts:
        monitoring-stack:
    openclaw:
      hosts:
        openclaw:
    authentik:
      hosts:
        authentik:
    wireguard:
      hosts:
        wireguard:
    step_ca:
      hosts:
        step-ca:
    libby_alert:
      hosts:
        libby-alert:
    kanboard:
      hosts:
        kanboard:
    minecraft:
      hosts:
        minecraft:
    mailserver:
      hosts:
        mailserver:
    pxe:
      hosts:
        pxe-server:
    zigbee2mqtt:
      hosts:
        zigbee2mqtt:
    claude_os:
      hosts:
        claude-os:
    pwnagotchi:
      hosts:
        pwnagotchi:
    ollama:
      hosts:
        ollama:
    piboard_dashboard:
      hosts:
        piboard:
