# setup-alertmind.yml - Deploy alertmind AI alert triage service
#
# Syncs Go source to the monitoring LXC, builds a Docker image there via
# multi-stage Dockerfile, writes credentials, wires Alertmanager, and starts.
#
# Usage:
#   make alertmind ANTHROPIC_API_KEY=sk-ant-... DISCORD_WEBHOOK=https://...
#   make alertmind ANTHROPIC_API_KEY=sk-ant-... SLACK_WEBHOOK=https://hooks.slack.com/...
---
- name: Deploy alertmind alert triage service
  hosts: lxc_services:&monitoring
  vars:
    mon_user: monitoring
    mon_base_dir: /opt/monitoring
    anthropic_api_key: ""
    slack_webhook_url: ""
    discord_webhook_url: ""
    twilio_account_sid: ""
    twilio_auth_token: ""
    whatsapp_from: ""
    whatsapp_to: ""
    alertmind_model: "claude-haiku-4-5-20251001"

  tasks:
    - name: Sync docker-compose.yml
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/monitoring/docker-compose.yml"
        dest: "{{ mon_base_dir }}/docker-compose.yml"
        owner: "{{ mon_user }}"
        group: "{{ mon_user }}"
        mode: "0644"

    - name: Create alertmind build context directory
      ansible.builtin.file:
        path: "{{ mon_base_dir }}/alertmind/build"
        state: directory
        owner: "{{ mon_user }}"
        group: "{{ mon_user }}"
        mode: "0755"

    - name: Sync alertmind source to LXC
      ansible.builtin.synchronize:
        src: "{{ playbook_dir }}/../../../alertmind/"
        dest: "{{ mon_base_dir }}/alertmind/build/"
        delete: true
        use_ssh_args: true
        rsync_opts:
          - "--no-perms"
          - "--exclude=.git"
          - "--exclude=alertmind"
      become: false

    - name: Write alertmind env file
      ansible.builtin.copy:
        content: |
          ANTHROPIC_API_KEY={{ anthropic_api_key }}
          SLACK_WEBHOOK_URL={{ slack_webhook_url }}
          DISCORD_WEBHOOK_URL={{ discord_webhook_url }}
          TWILIO_ACCOUNT_SID={{ twilio_account_sid }}
          TWILIO_AUTH_TOKEN={{ twilio_auth_token }}
          WHATSAPP_FROM={{ whatsapp_from }}
          WHATSAPP_TO={{ whatsapp_to }}
          ALERTMIND_MODEL={{ alertmind_model }}
          FETCH_RUNBOOKS=true
        dest: "{{ mon_base_dir }}/alertmind.env"
        owner: "{{ mon_user }}"
        group: "{{ mon_user }}"
        mode: "0600"
      no_log: true

    - name: Deploy Alertmanager config with alertmind route and receiver
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/monitoring/alertmanager/alertmanager.yml"
        dest: "{{ mon_base_dir }}/alertmanager/config/alertmanager.yml"
        owner: "{{ mon_user }}"
        group: "{{ mon_user }}"
        mode: "0644"

    - name: Build and start alertmind container
      ansible.builtin.command:
        cmd: docker compose up -d --build alertmind
        chdir: "{{ mon_base_dir }}"
      changed_when: true

    - name: Reload Alertmanager config
      ansible.builtin.uri:
        url: "http://localhost:9093/-/reload"
        method: POST
        status_code: 200
      ignore_errors: true

    - name: Verify alertmind is healthy
      ansible.builtin.uri:
        url: "http://localhost:8086/health"
        return_content: true
      register: health
      retries: 10
      delay: 5
      until: health.status == 200

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "alertmind deployed"
          - "Internal: http://192.168.86.25:8086"
          - "External: https://alertmind.woodhead.tech (Authentik SSO)"
          - "Webhook: http://alertmind:8080/webhook (from Alertmanager)"
          - "Test: curl -X POST http://192.168.86.25:8086/test"
